<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optimizator Transport Multi-Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
      .lang-btn {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 9999;
        background: var(--bg-card, #252527);
        border: 1px solid var(--border, #3a3a3c);
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 15px;
        cursor: pointer;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        color: var(--text-main, #f6e8e8);
        transition: background 0.2s, transform 0.1s;
        letter-spacing: 0.03em;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        user-select: none;
      }
      .lang-btn:hover { background: var(--bg-input, #2e2e30); transform: scale(1.04); }
    </style>
  </head>
  <body>

    <button class="lang-btn" id="langToggle" onclick="toggleLang()">🇬🇧 EN</button>

    <header>
      <div>
        <h1 data-i18n="title">Optimizator Transport Multi-Agent</h1>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="tabs">
          <button class="tab-btn active" data-tab="config" data-i18n="tab_config">Configurare</button>
          <button class="tab-btn" data-tab="results" data-i18n="tab_results">Rezultate</button>
          <button class="tab-btn" data-tab="iterations" data-i18n="tab_iterations">Tablou Iterativ</button>
          <button id="exportPdf" class="secondary" data-i18n="btn_export">⬇ Export PDF</button>
        </div>
      </section>

      <section class="section tab-panel active" data-tab-panel="config">
        <h2 data-i18n="h_config">Configurare scenariu</h2>
        <div class="controls">
          <label>
            <span data-i18n="label_scenario">Scenariu</span>
            <select id="scenarioSelect"></select>
          </label>
          <button id="loadScenario" data-i18n="btn_load">Incarca scenariu</button>
          <button id="addAgent" class="secondary" data-i18n="btn_add_agent">+ Agent</button>
          <button id="addTask" class="secondary" data-i18n="btn_add_task">+ Task</button>
          <button id="resetCost" class="secondary" data-i18n="btn_reset">Reseteaza matricea</button>
          <button id="saveProblem" class="secondary" data-i18n="btn_apply">✓ Aplica configurare</button>
        </div>

        <div class="table-box">
          <h3 data-i18n="h_cost_matrix">Matrice costuri</h3>
          <table id="costTable" class="cost-table"></table>
        </div>
      </section>

      <section class="section tab-panel" data-tab-panel="results">
        <h2 data-i18n="h_results">Rulare alocare</h2>
        <div class="controls">
          <button id="runRandom" data-i18n="btn_random">Alocare aleatoare</button>
          <button id="runOptimal" data-i18n="btn_optimal">Alocare optima</button>
          <button id="runCompare" data-i18n="btn_compare">⚡ Compara</button>
        </div>
        <div class="metrics" id="metricsBox"></div>
        <div id="conclusionBox" class="conclusion-card"></div>
        <div class="results">
          <div id="randomBox" class="result-card"></div>
          <div id="optimalBox" class="result-card"></div>
        </div>
      </section>

      <section class="section tab-panel" data-tab-panel="iterations">
        <h2 data-i18n="h_iterations">Tablou Iterativ</h2>
        <div class="table-box">
          <div id="iterationsTable" class="iterations-stack"></div>
        </div>
      </section>
    </main>

    <footer></footer>

    <!-- Modal overlay -->
    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal-box error" id="modalBox">
        <span class="modal-icon" id="modalIcon">⚠️</span>
        <div class="modal-title error" id="modalTitle">Eroare</div>
        <div class="modal-message" id="modalMessage"></div>
        <button class="modal-close" id="modalClose" onclick="closeModal()">OK</button>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/export.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
      window.appState = appState;
    </script>
  </body>
</html>
